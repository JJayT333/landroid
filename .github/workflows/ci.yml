name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "claude/**"
      - "codex/**"

jobs:
  root-app:
    name: Root app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/spine/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install backend spine runtime dependencies
        run: npm ci
        working-directory: backend/spine

      - name: Audit backend spine production dependencies
        run: npm audit --omit=dev
        working-directory: backend/spine

      - name: Backend spine tests
        run: npm test -- --config backend/spine/vitest.config.ts

      - name: Backend spine build
        run: ./node_modules/.bin/tsc -p backend/spine/tsconfig.json --noEmit

      - name: Build
        run: npm run build

  ai-proxy:
    name: AI proxy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ai-proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/ai-proxy/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
