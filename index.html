<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1A1A1B">
    <link rel="manifest" href="./manifest.webmanifest">
    <title>LANDroid > The Courthouse</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Google Fonts for Vintage Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Homemade+Apple&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        mono: ['"Courier Prime"', 'monospace'],
                        display: ['"Playfair Display"', 'serif'],
                        handwriting: ['"Homemade Apple"', 'cursive'],
                    },
                    colors: {
                        parchment: '#F5F1E3',
                        ink: '#1A1A1B',
                        sepia: '#704214',
                        fountain: '#003366',
                        stamp: '#8B0000',
                        teastain: '#E6DFCC'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; }

        :root {
            --parchment: #F5F1E3;
            --teastain: #E6DFCC;
            --ink: #1A1A1B;
            --sepia: #704214;
            --fountain: #003366;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 10% -20%, rgba(0, 51, 102, 0.10), transparent 35%),
                radial-gradient(circle at 95% 0%, rgba(112, 66, 20, 0.16), transparent 30%),
                linear-gradient(180deg, #f8f4ea 0%, #f5f1e3 55%, #eee7d5 100%);
            color: var(--ink);
            font-family: 'Courier Prime', monospace;
        }

        #root {
            min-height: 100vh;
            backdrop-filter: saturate(105%);
        }
        .parchment-grid {background-color: #f4efdf;background-image: linear-gradient(rgba(112, 66, 20, 0.10) 1px, transparent 1px),linear-gradient(90deg, rgba(112, 66, 20, 0.10) 1px, transparent 1px);background-size: 20px 20px, 20px 20px;}
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #E6DFCC; border-left: 1px solid #1A1A1B; }
        ::-webkit-scrollbar-thumb { background: #1A1A1B; border: 1px solid #F5F1E3; }
        ::-webkit-scrollbar-thumb:hover { background: #704214; }
        input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button {-webkit-appearance: none;appearance: none;margin: 0;}
        input[type="number"] { -moz-appearance: textfield;appearance: textfield;}
        .ink-shadow {border: 1px solid rgba(26, 26, 27, 0.28);box-shadow: 0 10px 22px rgba(26, 26, 27, 0.14), 0 2px 4px rgba(26, 26, 27, 0.08);border-radius: 10px;transition: box-shadow 0.2s ease, transform 0.2s ease;}
        .ink-shadow-lg {border: 1px solid rgba(26, 26, 27, 0.30);box-shadow: 0 18px 36px rgba(26, 26, 27, 0.16), 0 2px 8px rgba(26, 26, 27, 0.12);border-radius: 14px;}
        .ink-shadow-hover:hover {box-shadow: 0 16px 30px rgba(26, 26, 27, 0.20), 0 3px 9px rgba(26, 26, 27, 0.14);transform: translateY(-2px);}
        .rubber-stamp {border: 2px solid #8B0000;color: #8B0000;font-weight: 700;padding: 0.3rem 0.9rem;display: inline-block;text-transform: uppercase;letter-spacing: 0.1em;font-family: 'Courier Prime', monospace;background: rgba(255, 255, 255, 0.45);transform: rotate(-1.25deg);border-radius: 999px;opacity: 0.9;}
        .rubber-stamp.error {border-color: #8B0000;color: #8B0000;background: rgba(139, 0, 0, 0.05);font-weight: 900;transform: rotate(-4deg) scale(1.05);}
        input, select, textarea {background: #F5F1E3 !important;color: #1A1A1B !important;border-color: #1A1A1B !important;font-family: 'Courier Prime', monospace;}
        input:focus, select:focus, textarea:focus {border-color: #704214 !important;box-shadow: 0 0 0 3px rgba(112, 66, 20, 0.22) !important;outline: none;}
        option {background: #F5F1E3 !important;color: #1A1A1B !important;}
        .cyber-header-bg {background: linear-gradient(180deg, rgba(247, 242, 228, 0.95), rgba(236, 227, 208, 0.95));border-bottom: 1px solid rgba(26, 26, 27, 0.2);box-shadow: 0 10px 20px rgba(26, 26, 27, 0.08);backdrop-filter: blur(8px);position: relative;}
        .nav-active {background: #1A1A1B !important;border-color: #1A1A1B !important;color: #F5F1E3 !important;box-shadow: none !important;}
        .tree-line { background: #1A1A1B !important; }
        tr:hover td { background: rgba(112, 66, 20, 0.08) !important; }
        .print-only { display: none; }
        @media print {* { overflow: visible !important; }body, html, #root {background: white !important;color: black !important;-webkit-print-color-adjust: exact; print-color-adjust: exact;margin: 0; padding: 0;height: auto !important; width: auto !important; display: block !important;}.no-print { display: none !important; }.print-only { display: block !important; }.ink-shadow, .ink-shadow-lg { box-shadow: none !important; border: 1px solid #1A1A1B !important; }.print-canvas-container {position: static !important;display: block !important;width: auto !important;height: auto !important;background: transparent !important;}.print-page-break {page-break-after: always !important;break-after: page !important;margin: 0 !important;padding: 0 !important;border: none !important;position: relative !important;overflow: hidden !important;background: white !important;}}
    </style>
</head>
<body class="antialiased selection:bg-sepia/30 selection:text-sepia font-mono">
    <div id="root"></div>
    <script src="./dist/workspaceStorage.js"></script>
    <script src="./dist/storageProvider.js"></script>
    <script src="./dist/dropboxIntegration.js"></script>
    <script src="./dist/workspaceDomain.js"></script>
    <script src="./dist/auditLog.js"></script>
    <script type="text/babel" src="./dist/app.jsx"></script>
</body>
</html>
