<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANDroid by Abstract Mapping</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                            950: '#042f2e',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Hide Number Input Arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }
        input[type="number"] { 
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-900 antialiased selection:bg-brand-200 selection:text-brand-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useMemo, useRef, useEffect } = React;

        // Firebase Setup Engine
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        let app, auth, db;
        if (firebaseConfig) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // Modern Lucide-style Icons
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                Upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5a2 2 0 0 0-2-2h-2M6 14h12v8H6v-8z" />,
                List: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />,
                Close: <path d="M18 6L6 18M6 6l12 12" />,
                Eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></>,
                Archive: <><polyline points="21 8 21 21 3 21 3 8" /><rect x="1" y="3" width="22" height="5" /><line x1="10" y1="12" x2="14" y2="12" /></>,
                Convey: <><path d="M21 3L14.3 21.4a.5.5 0 0 1-.9 0L10 14l-7.4-3.4a.5.5 0 0 1 0-.9L21 3Z" /><path d="M21 3L10 14" /></>,
                Cpu: <><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><rect x="9" y="9" width="6" height="6" /><line x1="9" y1="1" x2="9" y2="4" /><line x1="15" y1="1" x2="15" y2="4" /><line x1="9" y1="20" x2="9" y2="23" /><line x1="15" y1="20" x2="15" y2="23" /><line x1="20" y1="9" x2="23" y2="9" /><line x1="20" y1="15" x2="23" y2="15" /><line x1="1" y1="9" x2="4" y2="9" /><line x1="1" y1="15" x2="4" y2="15" /></>,
                Chart: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="9" y1="3" x2="9" y2="21" /><line x1="15" y1="3" x2="15" y2="21" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="3" y1="15" x2="21" y2="15" /></>,
                FileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></>,
                Paperclip: <><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" /></>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                Link: <><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" /></>,
                Cloud: <><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const defaultRoot = {
                id: 'root', 
                instrument: 'Original Grant', vol: '', page: '', docNo: 'LAND_GRANT_001',
                fileDate: '1836-03-02', date: '1836-03-02', 
                grantor: 'State Government', grantee: 'Original Grantee', 
                landDesc: 'All that certain tract...', remarks: 'Root of Title',
                fraction: 1.0, initialFraction: 1.0, parentId: null, docData: '', type: 'conveyance'
            };

            const [nodes, setNodes] = useState([defaultRoot]);
            const [view, setView] = useState('ledger'); 
            const [showModal, setShowModal] = useState(false);
            const [modalMode, setModalMode] = useState('edit'); 
            const [activeNode, setActiveNode] = useState(null);
            const [viewerData, setViewerData] = useState(null);
            
            // Cloud & Auth State
            const [user, setUser] = useState(null);
            const [savedProjects, setSavedProjects] = useState([]);
            const [showCloudModal, setShowCloudModal] = useState(false);
            const [projectName, setProjectName] = useState('My Workspace');
            const [isSaving, setIsSaving] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null); // Replaces native confirm()
            
            const [attachParentId, setAttachParentId] = useState('root');
            const [attachType, setAttachType] = useState('conveyance');
            
            const fileInput = useRef(null);
            const modalUploadRef = useRef(null);

            const [form, setForm] = useState({
                instrument: '', vol: '', page: '', docNo: '', fileDate: '', date: '',
                grantor: '', grantee: '', landDesc: '', remarks: '', fraction: 0, initialFraction: 0, docData: '',
                conveyanceMode: 'fraction', splitBasis: 'remaining', type: 'conveyance',
                numerator: 1, denominator: 2, manualAmount: 0
            });

            // Initialize Authentication
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth failed:", e); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Subscribe to Cloud Workspaces
            useEffect(() => {
                if (!user || !db) return;
                const workspacesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'workspaces');
                const unsubscribe = onSnapshot(workspacesRef, (snapshot) => {
                    const projs = [];
                    snapshot.forEach(doc => projs.push({ id: doc.id, ...doc.data() }));
                    projs.sort((a,b) => b.updatedAt - a.updatedAt);
                    setSavedProjects(projs);
                }, (error) => {
                    console.error("Firestore sync error", error);
                });
                return () => unsubscribe();
            }, [user]);

            // Cloud Data Handlers
            const handleSaveWorkspace = async () => {
                if (!user || !db || !projectName.trim()) return;
                setIsSaving(true);
                try {
                    const existing = savedProjects.find(p => p.name.toLowerCase() === projectName.trim().toLowerCase());
                    
                    // Strip base64 payloads to ensure we comfortably fit inside Cloud limits
                    const nodesToSave = nodes.map(n => {
                        const copy = { ...n };
                        if (copy.docData) copy.hasDoc = true; 
                        delete copy.docData; 
                        return copy;
                    });

                    const data = {
                        name: projectName.trim(),
                        nodes: nodesToSave,
                        updatedAt: Date.now()
                    };

                    if (existing) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workspaces', existing.id), data);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'workspaces'), data);
                    }
                    setShowCloudModal(false);
                } catch (e) {
                    console.error("Save error:", e);
                }
                setIsSaving(false);
            };

            const handleDeleteWorkspace = async (id) => {
                if (!user || !db) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workspaces', id));
                } catch (e) {
                    console.error(e);
                }
            };

            const handleLoadWorkspace = (p) => {
                setNodes(p.nodes);
                setProjectName(p.name);
                setShowCloudModal(false);
            };

            // Filename Automation Logic
            const handleDocSelection = (e) => {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') return;
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setForm(p => ({ ...p, docData: ev.target.result, docNo: cleanName }));
                };
                reader.readAsDataURL(file);
            };

            const formatFraction = (num) => (isNaN(num) || num === null ? "0.00000000" : num.toFixed(8));

            // Advanced 3-Way Math Engine
            const calcShare = useMemo(() => {
                if (modalMode !== 'convey' && modalMode !== 'attach') return 0;
                
                const parentIdToUse = modalMode === 'attach' ? attachParentId : activeNode?.id;
                const parent = nodes.find(n => n.id === parentIdToUse);
                if (!parent) return 0;
                
                const ratio = (parseFloat(form.numerator || 0) / parseFloat(form.denominator || 1));
                
                if (form.conveyanceMode === 'all') return parent.fraction;
                if (form.conveyanceMode === 'fixed') return parseFloat(form.manualAmount || 0);
                
                if (form.conveyanceMode === 'fraction') {
                    let base = 1.0;
                    if (form.splitBasis === 'whole') base = 1.0;
                    else if (form.splitBasis === 'initial') base = parent.initialFraction ?? parent.fraction;
                    else if (form.splitBasis === 'remaining') base = parent.fraction;
                    return base * ratio;
                }
                return 0;
            }, [form, nodes, modalMode, activeNode, attachParentId]);

            const openEdit = (node) => {
                setModalMode('edit');
                setActiveNode(node);
                setForm({ ...node, conveyanceMode: 'fraction', splitBasis: 'remaining', numerator: 1, denominator: 2, manualAmount: 0 });
                setShowModal(true);
            };

            const openConvey = (node) => {
                setModalMode('convey');
                setActiveNode(node);
                const today = new Date().toISOString().split('T')[0];
                setForm({
                    instrument: 'Warranty Deed', vol: '', page: '', docNo: '',
                    fileDate: today, date: today, type: 'conveyance',
                    grantor: node.grantee, grantee: '', landDesc: node.landDesc, remarks: '',
                    conveyanceMode: 'fraction', splitBasis: 'remaining', numerator: 1, denominator: 2, manualAmount: 0, docData: ''
                });
                setShowModal(true);
            };

            const openRelated = (node) => {
                setModalMode('add_related');
                setActiveNode(node);
                const today = new Date().toISOString().split('T')[0];
                setForm({
                    instrument: 'Affidavit of Heirship', vol: '', page: '', docNo: '',
                    fileDate: today, date: today, type: 'related',
                    grantor: '', grantee: node.grantee, landDesc: node.landDesc, remarks: 'Related to branch',
                    conveyanceMode: 'fraction', splitBasis: 'remaining', numerator: 1, denominator: 2, manualAmount: 0, docData: ''
                });
                setShowModal(true);
            };

            const openAttach = (node) => {
                setModalMode('attach');
                setActiveNode(node);
                setAttachParentId('root');
                setAttachType('conveyance');
                setForm({
                    ...node,
                    conveyanceMode: 'fraction', splitBasis: 'remaining', numerator: 1, denominator: 2, manualAmount: 0
                });
                setShowModal(true);
            };

            const handleCommit = () => {
                if (modalMode === 'edit') {
                    setNodes(nodes.map(n => n.id === activeNode.id ? { ...n, ...form } : n));
                } else if (modalMode === 'convey') {
                    const newId = Math.random().toString(36).substr(2, 9);
                    const updatedNodes = nodes.map(n => n.id === activeNode.id ? { ...n, fraction: Math.max(0, n.fraction - calcShare) } : n);
                    setNodes([...updatedNodes, { ...form, id: newId, type: 'conveyance', fraction: calcShare, initialFraction: calcShare, parentId: activeNode.id }]);
                } else if (modalMode === 'add_related') {
                    const newId = Math.random().toString(36).substr(2, 9);
                    setNodes([...nodes, { ...form, id: newId, type: 'related', fraction: 0, initialFraction: 0, parentId: activeNode.id }]);
                } else if (modalMode === 'attach') {
                    if (attachType === 'conveyance') {
                        const updatedNodes = nodes.map(n => {
                            if (n.id === attachParentId) return { ...n, fraction: Math.max(0, n.fraction - calcShare) };
                            if (n.id === activeNode.id) return { ...form, parentId: attachParentId, type: 'conveyance', fraction: calcShare, initialFraction: calcShare };
                            return n;
                        });
                        setNodes(updatedNodes);
                    } else {
                        setNodes(nodes.map(n => n.id === activeNode.id ? { ...form, parentId: attachParentId, type: 'related', fraction: 0, initialFraction: 0 } : n));
                    }
                }
                setShowModal(false);
            };

            const requestDeleteRecord = (node) => {
                setConfirmAction({
                    title: 'Delete Title Record',
                    message: `Are you sure you want to permanently delete "${node.instrument}" to ${node.grantee}? This will also safely detach any child branches.`,
                    actionText: 'Delete Record',
                    onConfirm: () => setNodes(nodes.filter(x => x.id !== node.id && x.parentId !== node.id))
                });
            };

            const exportCSV = () => {
                const headers = ["Documents Hyperlinked", "Instrument", "Order by Date", "Image Path", "Vol", "Page", "Inst No.", "File Date", "Inst Date", "Grantor / Assignor", "Grantee / Assignee", "Land Desc.", "Remarks", "INTERNAL_REMAINING_FRACTION", "INTERNAL_INITIAL_FRACTION", "INTERNAL_ID", "INTERNAL_PID", "INTERNAL_DOC", "INTERNAL_TYPE"];
                const rows = nodes.map((n, i) => [
                    i + 1, n.instrument, i + 1, `TORS_Documents\\${n.docNo}.pdf`, n.vol, n.page, n.docNo,
                    n.fileDate, n.date, `"${n.grantor}"`, `"${n.grantee}"`, `"${n.landDesc}"`, `"${n.remarks}"`,
                    n.fraction, n.initialFraction || n.fraction, n.id, n.parentId || "NULL", `"${n.docData || ""}"`, n.type || 'conveyance'
                ]);
                const content = "\uFEFF" + headers.join(",") + "\n" + rows.map(r => r.join(",")).join("\n");
                const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `LANDroid_Export_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const findHeader = (row, patterns) => {
                            const keys = Object.keys(row);
                            for (let pattern of patterns) {
                                const match = keys.find(k => pattern.test(k));
                                if (match) return row[match].trim();
                            }
                            return "";
                        };

                        const newNodes = results.data.map(row => {
                            const isInternal = !!row['INTERNAL_ID'];
                            return {
                                id: row['INTERNAL_ID'] || Math.random().toString(36).substr(2, 9),
                                instrument: findHeader(row, [/^Instrument$/i, /^Instrument \(/i, /Instrument/i]),
                                vol: findHeader(row, [/^Vol/i]),
                                page: findHeader(row, [/^Page/i]),
                                docNo: findHeader(row, [/Inst[\s\S]*No/i, /Doc[\s\S]*No/i]),
                                fileDate: findHeader(row, [/File[\s\S]*Date/i]),
                                date: findHeader(row, [/Inst[\s\S]*Eff/i, /Inst[\s\S]*Date/i, /Effective[\s\S]*Date/i, /^Date$/i]),
                                grantor: findHeader(row, [/Grantor/i, /Assignor/i, /Lessor/i]),
                                grantee: findHeader(row, [/Grantee/i, /Assignee/i, /Lessee/i, /Subject/i]),
                                landDesc: findHeader(row, [/Land[\s\S]*Desc/i, /Description/i]),
                                remarks: findHeader(row, [/Remark/i, /Note/i]),
                                fraction: isInternal ? parseFloat(row['INTERNAL_REMAINING_FRACTION'] || 0) : 0,
                                initialFraction: isInternal ? parseFloat(row['INTERNAL_INITIAL_FRACTION'] || 0) : 0,
                                parentId: isInternal ? (row['INTERNAL_PID'] === "NULL" ? null : row['INTERNAL_PID']) : 'unlinked', 
                                docData: row['INTERNAL_DOC'] ? row['INTERNAL_DOC'].replace(/(^"|"$)/g, '') : "",
                                type: row['INTERNAL_TYPE'] || 'conveyance'
                            };
                        });
                        
                        if (newNodes.length) setNodes(newNodes);
                    },
                    error: (error) => {
                        console.error("Error parsing CSV:", error);
                    }
                });
                e.target.value = ''; 
            };

            const buildTree = (pId = null) => {
                const children = nodes.filter(n => n.parentId === pId && n.type !== 'related');
                return children.map(n => ({ ...n, children: buildTree(n.id) }));
            };
            const tree = useMemo(() => buildTree(), [nodes]);

            const TreeNode = ({ n, isRoot }) => {
                const relatedDocs = nodes.filter(x => x.parentId === n.id && x.type === 'related');
                
                return (
                    <div className="flex flex-col items-center relative animate-fade-in">
                        <div className="z-10 group relative">
                            <div 
                                onClick={() => openEdit(n)} 
                                className="bg-white p-5 border border-slate-200 rounded-2xl shadow-sm min-w-[280px] max-w-[320px] cursor-pointer hover:border-brand-400 hover:shadow-xl hover:shadow-brand-900/5 transition-all duration-300"
                            >
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[10px] font-bold text-brand-600 uppercase tracking-widest bg-brand-50 px-2 py-1 rounded-md">
                                        {n.instrument}
                                    </span>
                                    {(n.docData || n.hasDoc) && <div className="text-slate-400"><Icon name="FileText" size={14} /></div>}
                                </div>
                                
                                <div className="mb-2">
                                    <div className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-0.5">Grantee / Assignee</div>
                                    <div className="font-bold text-slate-900 truncate text-sm">{n.grantee}</div>
                                </div>
                                
                                <div className="mb-3">
                                    <div className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-0.5">Grantor / Assignor</div>
                                    <div className="text-xs text-slate-500 truncate">{n.grantor}</div>
                                </div>
                                
                                <div className="flex justify-between items-end border-t border-slate-50 pt-3">
                                    <div>
                                        <div className="text-[9px] text-slate-400 uppercase tracking-widest mb-0.5">Retained Share</div>
                                        <div className="text-lg font-black text-brand-700 font-mono leading-none tracking-tight">{formatFraction(n.fraction)}</div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[9px] text-slate-400 uppercase tracking-widest mb-0.5">Inst Date</div>
                                        <div className="text-xs font-medium text-slate-600">{n.date}</div>
                                    </div>
                                </div>

                                {/* Display Attached Related Docs */}
                                {relatedDocs.length > 0 && (
                                    <div className="mt-3 pt-3 border-t border-dashed border-slate-200">
                                        <div className="text-[9px] text-slate-400 uppercase font-bold mb-1 flex items-center gap-1">
                                            <Icon name="Paperclip" size={10} /> Attached Branch Work
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            {relatedDocs.map(rd => (

                                        </div>

                                        <div className="col-span-6">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase mb-1.5 block tracking-wider">Remarks (M)</label>
                                            <textarea className="w-full border border-slate-200 rounded-xl p-3 bg-white focus:ring-2 focus:ring-brand-500/30 outline-none transition-all shadow-sm h-14 text-sm" value={form.remarks} onChange={(e) => setForm({...form, remarks: e.target.value})} />
                                        </div>

                                        {/* MATH ENGINE UI */}
                                        {(modalMode === 'convey' || (modalMode === 'attach' && attachType === 'conveyance')) && (
                                            <div className="col-span-6 bg-white border border-brand-100 rounded-2xl p-6 shadow-sm relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                                                
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="text-xs font-black uppercase text-brand-800 tracking-widest flex items-center gap-2">
                                                        <Icon name="Cpu" size={16} /> Math Engine
                                                    </span>
                                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                                        {['fraction', 'all', 'fixed'].map(m => (
                                                            <button key={m} onClick={() => setForm({...form, conveyanceMode: m})} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${form.conveyanceMode === m ? 'bg-white text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{m}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                {form.conveyanceMode === 'fraction' && (
                                                    <div className="mb-6">
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Select Calculation Basis</label>
                                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                            <button onClick={() => setForm({...form, splitBasis: 'whole'})} className={`p-3 rounded-xl border text-left transition-all ${form.splitBasis === 'whole' ? 'bg-brand-50 border-brand-300 ring-1 ring-brand-300' : 'bg-white border-slate-200 hover:border-brand-200'}`}>
                                                                <div className={`text-[10px] font-bold uppercase mb-1 ${form.splitBasis === 'whole' ? 'text-brand-700' : 'text-slate-500'}`}>Whole Tract</div>
                                                                <div className="font-mono text-xs text-slate-400">1.00000000</div>
                                                            </button>
                                                            
                                                            <button onClick={() => setForm({...form, splitBasis: 'initial'})} className={`p-3 rounded-xl border text-left transition-all ${form.splitBasis === 'initial' ? 'bg-brand-50 border-brand-300 ring-1 ring-brand-300' : 'bg-white border-slate-200 hover:border-brand-200'}`}>
                                                                <div className={`text-[10px] font-bold uppercase mb-1 ${form.splitBasis === 'initial' ? 'text-brand-700' : 'text-slate-500'}`}>Original Granted</div>
                                                                <div className="font-mono text-xs text-slate-400">{formatFraction(parentForMath?.initialFraction ?? parentForMath?.fraction)}</div>
                                                            </button>

                                                            <button onClick={() => setForm({...form, splitBasis: 'remaining'})} className={`p-3 rounded-xl border text-left transition-all ${form.splitBasis === 'remaining' ? 'bg-brand-50 border-brand-300 ring-1 ring-brand-300' : 'bg-white border-slate-200 hover:border-brand-200'}`}>
                                                                <div className={`text-[10px] font-bold uppercase mb-1 ${form.splitBasis === 'remaining' ? 'text-brand-700' : 'text-slate-500'}`}>Remaining Share</div>
                                                                <div className="font-mono text-xs text-slate-400">{formatFraction(parentForMath?.fraction)}</div>
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}

                                                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 bg-slate-50 p-5 rounded-xl border border-slate-100">
                                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                                        {form.conveyanceMode === 'fraction' && (
                                                            <>
                                                                <div className="relative">
                                                                    <div className="text-[8px] font-bold text-slate-400 uppercase absolute -top-4 left-0">Numerator</div>
                                                                    <input type="number" className="w-20 p-3 rounded-xl text-center font-bold border border-slate-200 focus:ring-2 focus:ring-brand-500/30 outline-none text-lg shadow-sm bg-white" value={form.numerator === 0 ? '' : form.numerator} placeholder="1" onFocus={e => e.target.select()} onChange={e => setForm({...form, numerator: e.target.value})} />
                                                                </div>
                                                                <span className="font-black text-slate-300 text-2xl pt-2">/</span>
                                                                <div className="relative">
                                                                    <div className="text-[8px] font-bold text-slate-400 uppercase absolute -top-4 left-0">Denominator</div>
                                                                    <input type="number" className="w-24 p-3 rounded-xl text-center font-bold border border-slate-200 focus:ring-2 focus:ring-brand-500/30 outline-none text-lg shadow-sm bg-white" value={form.denominator === 0 ? '' : form.denominator} placeholder="2" onFocus={e => e.target.select()} onChange={e => setForm({...form, denominator: e.target.value})} />
                                                                </div>
                                                            </>
                                                        )}
                                                        {form.conveyanceMode === 'fixed' && (
                                                            <div className="relative w-full">
                                                                <div className="text-[8px] font-bold text-slate-400 uppercase absolute -top-4 left-0">Fixed Decimal Amount</div>
                                                                <input type="number" step="0.00000001" className="w-full sm:w-48 p-3 rounded-xl font-mono font-bold border border-slate-200 outline-none text-lg shadow-sm bg-white" value={form.manualAmount === 0 ? '' : form.manualAmount} placeholder="0.000" onFocus={e => e.target.select()} onChange={e => setForm({...form, manualAmount: e.target.value})} />
                                                            </div>
                                                        )}
                                                        {form.conveyanceMode === 'all' && (
                                                            <div className="text-sm font-bold text-brand-700 bg-brand-50 px-4 py-2 rounded-lg border border-brand-100">Transferring 100% of Balance</div>
                                                        )}
                                                    </div>
                                                    
                                                    <div className="flex flex-col sm:items-end gap-3 w-full sm:w-auto">
                                                        <div className="text-left sm:text-right">
                                                            <div className="text-[10px] font-bold uppercase text-brand-600 mb-0.5 tracking-widest">To Be Conveyed</div>
                                                            <div className="text-2xl font-black text-slate-900 font-mono tracking-tight">{formatFraction(calcShare)}</div>
                                                        </div>
                                                        <div className={`px-4 py-2.5 rounded-xl border shadow-sm text-left sm:text-right transition-colors ${ (parentForMath?.fraction - calcShare) < -0.00000001 ? 'bg-rose-50 border-rose-200' : 'bg-white border-slate-200' }`}>
                                                            <div className={`text-[9px] font-black uppercase tracking-widest mb-1 ${ (parentForMath?.fraction - calcShare) < -0.00000001 ? 'text-rose-500' : 'text-slate-400' }`}>Grantor Retention Balance</div>
                                                            <div className={`font-mono text-xs flex items-center sm:justify-end gap-2 ${ (parentForMath?.fraction - calcShare) < -0.00000001 ? 'text-rose-600 font-bold' : 'text-slate-600' }`}>
                                                                <span>{formatFraction(parentForMath?.fraction)}</span>
                                                                <span className="text-slate-300">-</span>
                                                                <span>{formatFraction(calcShare)}</span>
                                                                <span className="text-slate-300">=</span>
                                                                <span className={`text-sm ${ (parentForMath?.fraction - calcShare) < -0.00000001 ? 'bg-rose-100 px-1 rounded' : 'font-bold text-slate-900' }`}>{formatFraction(parentForMath?.fraction - calcShare)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {modalMode === 'edit' && form.type !== 'related' && form.parentId !== 'unlinked' && (
                                            <>
                                                <div className="col-span-3">
                                                    <label className="text-[10px] font-bold text-brand-600 uppercase mb-1.5 block tracking-widest">Initial Granted Share (Override)</label>
                                                    <input type="number" step="0.00000001" className="w-full border border-slate-200 rounded-xl p-3 bg-white font-mono font-bold focus:ring-2 outline-none text-brand-700 shadow-sm" value={form.initialFraction === 0 ? '' : form.initialFraction} onFocus={e => e.target.select()} onChange={(e) => setForm({...form, initialFraction: parseFloat(e.target.value) || 0})} />
                                                </div>
                                                <div className="col-span-3">
                                                    <label className="text-[10px] font-bold text-brand-600 uppercase mb-1.5 block tracking-widest">Remaining Retained Share (Override)</label>
                                                    <input type="number" step="0.00000001" className="w-full border border-slate-200 rounded-xl p-3 bg-white font-mono font-bold focus:ring-2 outline-none text-brand-700 shadow-sm" value={form.fraction === 0 ? '' : form.fraction} onFocus={e => e.target.select()} onChange={(e) => setForm({...form, fraction: parseFloat(e.target.value) || 0})} />
                                                </div>
                                            </>
                                        )}

                                        {/* File Upload Area */}
                                        <div className="col-span-6 pt-2">
                                            <div className="flex items-center gap-4 p-4 border border-dashed border-slate-300 rounded-2xl bg-slate-50 hover:bg-slate-100 transition-colors">
                                                <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-brand-600">
                                                    <Icon name="Upload" size={20} />
                                                </div>
                                                <div className="flex-1">
                                                    <h4 className="text-sm font-bold text-slate-800">Vault PDF Link</h4>
                                                    <p className="text-[10px] text-slate-500 mt-0.5">Uploading automatically populates the Inst No. field.</p>
                                                </div>
                                                <input type="file" ref={modalUploadRef} onChange={handleDocSelection} accept=".pdf" className="hidden" />
                                                
                                                <div className="flex gap-2">
                                                    {form.docData && (
                                                        <button onClick={() => setViewerData(form.docData)} className="px-4 py-2 bg-white text-brand-600 rounded-xl border border-brand-200 font-bold text-xs hover:bg-brand-50 shadow-sm flex items-center gap-2">
                                                            <Icon name="Eye" size={14}/> View
                                                        </button>
                                                    )}
                                                    <button onClick={() => modalUploadRef.current.click()} className="px-6 py-2 bg-slate-900 text-white rounded-xl font-bold uppercase text-xs hover:bg-brand-600 transition-all tracking-widest shadow-md">
                                                        Browse
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Modal Footer */}
                                <div className="p-6 bg-white border-t border-slate-100 flex gap-4">
                                    <button onClick={handleCommit} className={`flex-1 py-4 text-white rounded-xl font-black uppercase tracking-widest shadow-lg transition-all transform hover:-translate-y-0.5 ${
                                        modalMode === 'edit' ? 'bg-slate-900 hover:bg-slate-800' : 
                                        modalMode === 'add_related' ? 'bg-slate-700 hover:bg-slate-600' :
                                        modalMode === 'attach' ? 'bg-amber-600 hover:bg-amber-700 shadow-amber-600/30' :
                                        'bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 shadow-brand-500/30'
                                    }`}>
                                        Commit {modalMode === 'add_related' ? 'Document' : modalMode === 'attach' ? 'Linked Record' : 'Transaction'}
                                    </button>
                                    <button onClick={() => setShowModal(false)} className="px-10 py-4 bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:bg-slate-50 rounded-xl font-bold uppercase tracking-widest transition-colors">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NEW CLOUD VAULT MODAL */}
                    {showCloudModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[150] flex items-center justify-center p-4 sm:p-6 animate-fade-in">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col animate-slide-up">
                                <div className="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-6 flex justify-between items-center text-white">
                                    <div>
                                        <h2 className="text-2xl font-black flex items-center gap-2"><Icon name="Cloud" size={24} /> Secure Cloud Vault</h2>
                                        <p className="text-[10px] opacity-80 uppercase font-bold tracking-widest mt-1">Cross-Device Synchronization Active</p>
                                    </div>
                                    <button onClick={() => setShowCloudModal(false)} className="bg-white/10 hover:bg-white/20 p-2.5 rounded-full transition-all backdrop-blur-md">
                                        <Icon name="Close" size={20} />
                                    </button>
                                </div>
                                <div className="p-8">
                                    <div className="mb-8">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Save Current Workspace</label>
                                        <div className="flex gap-3">
                                            <input type="text" className="flex-1 border border-slate-200 rounded-xl p-4 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500/30 outline-none font-bold text-slate-800 shadow-sm" value={projectName} onChange={e => setProjectName(e.target.value)} placeholder="e.g., Smith Family Tract" />
                                            <button onClick={handleSaveWorkspace} disabled={isSaving || !projectName.trim()} className="px-8 py-4 bg-indigo-600 text-white rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-indigo-600/30 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:hover:translate-y-0">
                                                {isSaving ? 'Saving...' : 'Save'}
                                            </button>
                                        </div>
                                        <p className="text-[10px] text-slate-400 mt-2 flex items-center gap-1 italic"><Icon name="List" size={10}/> Note: Massive Vault PDFs are excluded from Cloud Sync to optimize speed & space.</p>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Saved Lineage Projects</label>
                                        <div className="bg-slate-50 border border-slate-200 rounded-2xl overflow-hidden max-h-64 overflow-y-auto">
                                            {savedProjects.length === 0 ? (
                                                <div className="p-8 text-center text-slate-400 text-sm font-medium">No projects saved to the cloud yet.</div>
                                            ) : (
                                                <div className="divide-y divide-slate-200">
                                                    {savedProjects.map(p => (
                                                        <div key={p.id} className="flex justify-between items-center p-4 hover:bg-white transition-colors">
                                                            <div>
                                                                <div className="font-bold text-slate-800 text-sm">{p.name}</div>
                                                                <div className="text-[10px] text-slate-400 uppercase tracking-wider mt-0.5 flex items-center gap-1"><Icon name="Clock" size={10} /> Last updated: {new Date(p.updatedAt).toLocaleString()}</div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <button onClick={() => handleLoadWorkspace(p)} className="px-4 py-2 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors">Load</button>
                                                                <button onClick={() => {
                                                                    setConfirmAction({
                                                                        title: 'Delete Cloud Workspace',
                                                                        message: `Are you sure you want to permanently delete "${p.name}" from the cloud?`,
                                                                        actionText: 'Delete Workspace',
                                                                        onConfirm: () => handleDeleteWorkspace(p.id)
                                                                    });
                                                                }} className="p-2 text-rose-400 hover:bg-rose-100 hover:text-rose-600 rounded-lg transition-colors"><Icon name="Trash" size={16} /></button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NEW CUSTOM CONFIRMATION MODAL */}
                    {confirmAction && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[300] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-8 shadow-2xl max-w-sm w-full text-center animate-slide-up border border-slate-200">
                                <div className="bg-rose-100 text-rose-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                                    <Icon name="Trash" size={32} />
                                </div>
                                <h3 className="text-xl font-black text-slate-900 mb-2">{confirmAction.title}</h3>
                                <p className="text-sm text-slate-500 mb-8 leading-relaxed">{confirmAction.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmAction(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors uppercase tracking-widest text-xs">Cancel</button>
                                    <button onClick={() => { confirmAction.onConfirm(); setConfirmAction(null); }} className="flex-1 py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition-colors shadow-lg shadow-rose-600/30 uppercase tracking-widest text-xs">{confirmAction.actionText}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PDF VIEWER MODAL */}
                    {viewerData && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[200] flex flex-col items-center justify-center p-4 sm:p-8 animate-fade-in">
                            <div className="w-full max-w-7xl h-full flex flex-col bg-slate-800 rounded-3xl overflow-hidden shadow-2xl border border-white/10">
                                <div className="bg-slate-900/50 p-4 text-white flex justify-between items-center border-b border-white/10">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-brand-500/20 p-2 rounded-lg text-brand-400"><Icon name="FileText" size={20} /></div>
                                        <span className="text-lg font-black tracking-tight text-white uppercase">Vault Viewport</span>
                                    </div>
                                    <button onClick={() => setViewerData(null)} className="p-2 bg-white/5 hover:bg-rose-500/20 hover:text-rose-400 rounded-full transition-colors text-white">
                                        <Icon name="Close" size={20} />
                                    </button>
                                </div>
                                <object data={viewerData} type="application/pdf" className="w-full h-full border-none bg-white">
                                    <div className="flex flex-col items-center justify-center h-full p-20 text-center bg-slate-800">
                                        <Icon name="FileText" size={48} className="text-slate-500 mb-4" />
                                        <p className="text-slate-300 mb-6">Your browser does not support inline PDFs.</p>
                                        <a href={viewerData} target="_blank" className="bg-brand-600 hover:bg-brand-500 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-lg shadow-brand-500/20">Open External Tab</a>
                                    </div>
                                </object>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="fixed bottom-0 left-0 right-0 glass-panel border-t border-slate-200/50 p-3 flex justify-between items-center px-8 z-30">
                        <div className="flex items-center gap-6 text-[10px] font-bold uppercase text-slate-400">
                            <span className="text-brand-600 font-black tracking-widest flex items-center gap-1.5"><Icon name="Cpu" size={12}/> LANDroid v3.5</span>
                            <span className="hidden sm:inline-block w-1 h-1 bg-slate-300 rounded-full"></span>
                            <span>{nodes.length} Total Records Tracked</span>
                        </div>
                        <div className="text-[10px] text-slate-400 uppercase tracking-widest font-black flex items-center gap-2">
                            {user ? <span className="text-indigo-500 flex items-center gap-1"><Icon name="Cloud" size={10}/> Connected</span> : "Local Mode"} 
                            <span className="opacity-50 mx-1">|</span> Abstract Mapping
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
